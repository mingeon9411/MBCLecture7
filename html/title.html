<html>

<head>
    <meta charset="utf-8" />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #header {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        #header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            position: absolute;
            right: 30px;
            bottom: 20px;
            color: #8b007d;
            font-family: "맑은 고딕", sans-serif;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 5px white;
        }
        .script {
            font-family: 'Great Vibes', cursive;
            font-size: 52px;
            line-height: 1;
            color: #ffffff;
        }

        .modern {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            line-height: 1.2;
            color: #f3d6ff;
            letter-spacing: 1px;
        }
    </style>

</head>

<body>
    <div id="header">
        <img src="hearts2hearts.gif" alt="하츠투하츠">
        <div class="title">
            <span class="script">Hearts</span>
            <span class="modern">2Hearts</span>
        </div>
    </div>
</body>
</html>
